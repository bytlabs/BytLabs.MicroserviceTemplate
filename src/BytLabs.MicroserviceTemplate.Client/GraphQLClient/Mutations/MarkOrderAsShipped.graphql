mutation MarkOrderAsShipped($input: ShipOrderInput!) {
  markOrderAsShipped(input: { input: $input }) {
    shipOrderResult {
      orderId
    }
    errors {
      ... on BusinessError {
        code
        property
        message
      }
      ... on ValidationError {
        message
        fields {
          field
          code
          message
        }
      }
    }
  }
}
