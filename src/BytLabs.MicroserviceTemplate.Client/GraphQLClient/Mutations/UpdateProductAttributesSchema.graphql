mutation UpdateProductAttributesSchema($input: UpdateProductAttributesSchemaInput!) {
  updateProductAttributesSchema(input: $input) {
    product {
      id
      attributesSchema {
        key
      }
    }
    errors {
      ... on BusinessError {
        code
        property
        message
      }
      ... on ValidationError {
        message
        fields {
          field
          code
          message
        }
      }
    }
  }
}
