version: "3.8"

services:
  bytlabs-mongo:
    # MongoDB.Driver 3.x (pulled by the BytLabs 4.x packages) requires server >= 4.2.
    image: mongo:7.0
    container_name: bytlabs-mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - local_network

  # PostgreSQL backing store (used when DataStore:Provider=Postgres and by the acceptance matrix).
  bytlabs-postgres:
    image: postgres:16
    container_name: bytlabs-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: microservicetemplate
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - local_network

  bytlabs-microservice-template-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bytlabs-microservice-template-service
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      # In Docker the API reaches MongoDB by its service name, not localhost.
      MongoDatabaseConfiguration__ConnectionString: "mongodb://bytlabs-mongo:27017?retryWrites=false"
    ports:
      - "8080:8080"
      - "8081:8081"
    depends_on:
      - bytlabs-mongo
    networks:
      - local_network

  bytlabs-microservice-template-tests:
    build:
      context: .
      dockerfile: Dockerfile
      target: test
    container_name: bytlabs-microservice-template-tests
    environment:
      MongoDatabaseConfiguration__ConnectionString: "mongodb://bytlabs-mongo:27017?retryWrites=false"
    depends_on:
      - bytlabs-mongo
    networks:
      - local_network
    volumes:
      - ./test-results:/app/test-results

volumes:
  mongo_data:
  postgres_data:

networks:
  local_network:
